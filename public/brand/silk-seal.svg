<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Silk Room">
  <defs>
    <linearGradient id="silkFill" x1="28" y1="22" x2="92" y2="98" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5a3348"/>
      <stop offset="0.45" stop-color="#3d2433"/>
      <stop offset="1" stop-color="#2a1822"/>
    </linearGradient>
    <linearGradient id="silkEdge" x1="34" y1="30" x2="86" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8d0b0"/>
      <stop offset="1" stop-color="#c4a484"/>
    </linearGradient>
    <radialGradient id="sealGlow" cx="50%" cy="42%" r="55%">
      <stop stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f3ebe4" stop-opacity="0.95"/>
    </radialGradient>
  </defs>

  <!-- Soft cream seal -->
  <circle cx="60" cy="60" r="56" fill="url(#sealGlow)"/>
  <circle cx="60" cy="60" r="56" stroke="#3d2433" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Outer silk petal / ribbon form (not letters) -->
  <path
    d="M60 22c-11 2-24 12-26 26-2 12 6 20 16 24 4 1.5 7 4 7 8.5 0 7-6.5 12.5-15 12.5-5.5 0-10-2-13-5.5"
    stroke="url(#silkEdge)"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.55"
  />
  <path
    d="M60 22c-11 2-24 12-26 26-2 12 6 20 16 24 4 1.5 7 4 7 8.5 0 7-6.5 12.5-15 12.5-5.5 0-10-2-13-5.5"
    stroke="url(#silkFill)"
    stroke-width="8.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Inner flowing drape -->
  <path
    d="M68 28c10 4 18 14 18 26 0 14-10 22-22 25-5 1.2-8.5 4.5-8.5 9.5 0 8 8 14 18.5 14 7 0 12.5-2.5 16-7"
    stroke="url(#silkEdge)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.45"
  />
  <path
    d="M68 28c10 4 18 14 18 26 0 14-10 22-22 25-5 1.2-8.5 4.5-8.5 9.5 0 8 8 14 18.5 14 7 0 12.5-2.5 16-7"
    stroke="url(#silkFill)"
    stroke-width="7.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Soft center fold highlight -->
  <path
    d="M52 40c6-2 14 1 18 8 3.5 6 2 12-2 16"
    stroke="#f7efe4"
    stroke-width="2.2"
    stroke-linecap="round"
    opacity="0.55"
  />

  <!-- Quiet base curl -->
  <path
    d="M42 88c8 6 18 8 28 5"
    stroke="url(#silkEdge)"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.65"
  />
</svg>
